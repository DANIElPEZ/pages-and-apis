<!DOCTYPE html>
<html  lang="en">

<head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>OAuth Code</title>
     <style>
       * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: monospace;
}

body {
  background-color: #1a2f56;
}

div {
  display: flex;
  position: relative;
  flex-direction: column;
  align-items: center;
  padding: 10rem 1rem;
  width: 100%;
  gap: 0.6rem;
  height: 100dvh;
  color: #fff;

  > h2 {
    font-size: 1.4rem;
    text-align: center;
    font-weight: 500;
  }
  > p {
    font-size: 1.2rem;
    text-align: center;
    font-weight: 400;
  }
  > input {
    width: 300px;
    height: 2rem;
    border-radius: 0.3rem;
    padding: 0.5rem;
    background-color: #3c4e6f;
    color: #fff;
    font-size: 1rem;
    text-align: center;
    outline: 0;
    border: 0;
  }
  > button {
    position: absolute;
    bottom: 30px;
    padding: 0.7rem 10rem;
    background-color: #12213c;
    color: #fff;
    border: 0;
    border-radius: 0.8rem;
    font-size: 1.7rem;
  }
}
     </style>
     <script src="index.js">
       window.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const input = document.getElementById("codeInput");
  const btn = document.getElementById("copyBtn");

  if (input) input.value = code || "Code not found";

  if (btn) {
    btn.addEventListener("click", async () => {
      if (code) {
        try {
          await navigator.clipboard.writeText(code);
          alert("Code copied: " + code);
          window.close();
        } catch (err) {
          console.error("Failed to copy code:", err);
          alert("Could not copy the code.");
        }
      } else {
        alert("No code to copy.");
      }
    });
  }
});
     </script>
</head>

<body>
     <div>
          <h2>You are already logged in 😀</h2>
          <p>Please copy the code and paste it into the code field.</p>
          <input id="codeInput" readonly />
          <button id="copyBtn">Copy</button>
     </div>
</body>

</html>
